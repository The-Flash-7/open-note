name: Build & Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Linux Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Install Python Dependencies
        run: |
          pip install -r embedding_service/requirements.txt
          pip install pyinstaller>=6.0

      - name: Build Python Service
        run: |
          chmod +x scripts/build_embedding_service_linux.sh
          ./scripts/build_embedding_service_linux.sh

      - name: Install Flutter Dependencies
        run: flutter pub get

      - name: Install flutter_build_debian
        run: |
          dart pub global activate flutter_build_debian

      - name: Build Linux App
        run: flutter build linux --release

      - name: Build Debian Package
        run: flutter_build_debian

      - name: Rename Debian Package
        run: bash debian/rename_deb.sh

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenNote-linux

          path: debian/packages/*.deb

  release:
    needs: build-linux
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: OpenNote-linux

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            OpenNote*.deb
          generate_release_notes: true
