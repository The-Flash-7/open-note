name: ✨ 功能请求
description: 为桌面软件或CLI、MCP服务器提出一个新功能或改进
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        我们欢迎任何提升软件可用性的建议。请说明您希望解决什么样的场景。

  - type: textarea
    id: problem
    attributes:
      label: 背景与动机
      description: 这个功能是为了解决什么问题或痛点？
      placeholder: 例如“在夜间使用时，白色主题太刺眼了，我希望有夜间模式”
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望的解决方案
      description: 您理想中的功能表现是怎样的？尽量具体。
      placeholder: 例如“增加主题选项，选择‘日间还是夜间’”
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 替代方案
      description: 您尝试过哪些其他方法或变通方案？

  - type: textarea
    id: additional
    attributes:
      label: 额外信息
      description: 如有原型图、参考软件、相关文档链接，请附在此处

  - type: input
    id: version
    attributes:
      label: 当前软件版本
      description: 如果该功能与特定版本相关，请填写

  - type: dropdown
    id: os
    attributes:
      label: 适用操作系统
      multiple: true
      options:
        - Windows
        - macOS
        - Linux
        - 所有平台

  - type: checkboxes
    id: terms
    attributes:
      label: 确认事项
      options:
        - label: 我已搜索过现有 Issues，未发现类似请求
          required: true