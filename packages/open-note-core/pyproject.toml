[project]
name = "open-note-core"
version = "0.3.1"
description = "OpenNote 核心库 - 数据模型和 SQLite 存储层"
readme = "README.md"
license = {text = "MIT OR Apache-2.0"}
requires-python = ">=3.10"
authors = [
    {name = "litongshuai", email = "litongshuai.leader@qq.com"}
]
urls = {Homepage = "https://github.com/The-Flash-7/open-note"}
dependencies = []

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools.packages.find]
where = ["src"]
